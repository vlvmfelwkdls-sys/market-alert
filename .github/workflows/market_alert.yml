name: 글로벌 마켓 알림

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  send-market-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance requests
      - name: 마켓 알림 전송
        env:
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
        run: python market_alert.py
